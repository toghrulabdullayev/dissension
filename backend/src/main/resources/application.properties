spring.application.name=dissension-backend

# ---------------------------------------------------------------
# Database
# ---------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dissension}
spring.datasource.username=${DB_USERNAME:dissension}
spring.datasource.password=${DB_PASSWORD:dissension}
# Flyway owns the schema — Hibernate must not attempt to create or validate it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---------------------------------------------------------------
# Flyway
# ---------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---------------------------------------------------------------
# Redis
# ---------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ---------------------------------------------------------------
# JWT
# Dev default is a base64-encoded 32-byte key — MUST be overridden in production via JWT_SECRET env var
# Generate with: openssl rand -base64 32
# ---------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:Y2hhbmdlbWVjaGFuZ2VtZWNoYW5nZW1lY2hhbmdlbWU=}
app.jwt.access-token-expiry-ms=900000

# ---------------------------------------------------------------
# OAuth2 — Google
# ---------------------------------------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ---------------------------------------------------------------
# CORS / OAuth2 frontend redirect
# ---------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/auth/callback}

# ---------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------
management.endpoints.web.exposure.include=health,info

