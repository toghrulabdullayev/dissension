services:
  postgres:
    image: postgres:16-alpine
    container_name: dissension-postgres
    environment:
      POSTGRES_DB: dissension
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dissension"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dissension-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dissension
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SECURITY_JWT_SECRET: 9f8d86d1722a4fb8945ff1fc48f842289c4b227d0f0d4e09a7a5a7f4b60591f8
      SECURITY_JWT_EXPIRATION_MINUTES: 60
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
